<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ModelRadar · 模型雷达</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='10' fill='%23ef4444'/%3E%3Ccircle cx='16' cy='16' r='5' fill='%2300000000' stroke='%23fff' stroke-width='2'/%3E%3C/svg%3E" />
<link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="dot"></span>
    <span class="title">ModelRadar</span>
    <span class="subtitle">AI 模型实时雷达</span>
  </div>
  <div class="meta">
    <span id="health-dot" class="health-dot" title="系统健康" data-state="ok"></span>
    <span id="last-update">—</span>
    <button id="refresh" class="btn">刷新</button>
  </div>
</header>

<main class="container">

  <div id="week-glance" class="week-glance">
    <div class="sentence" id="week-sentence">加载中…</div>
    <a href="#weekly-reports-section" class="goto-report">查看本周周报 →</a>
  </div>

  <section class="main-grid">

    <div class="card card-signals">
      <div class="card-head">
        <h2>🔴 关键信号</h2>
        <div class="tabs">
          <button class="tab active" data-sev="important">重要</button>
          <button class="tab" data-sev="">全部</button>
          <button class="tab" data-sev="P0">P0</button>
          <button class="tab" data-sev="P1">P1</button>
        </div>
      </div>
      <div id="alerts" class="signals"><div class="loading">加载中…</div></div>
    </div>

    <div class="card card-heat">
      <div class="card-head">
        <h2>🔥 热度 Top 10</h2>
        <span id="heat-date" class="hint">—</span>
      </div>
      <div id="heat" class="heat">加载中...</div>
    </div>

    <div class="card card-timeline">
      <div class="card-head">
        <h2>🕒 Timeline · 最近变动</h2>
        <span id="timeline-total" class="hint">—</span>
      </div>
      <div class="tl-toolbar">
        <button id="tl-toggle-all" class="tl-toggle">显示全部（含已过滤）</button>
        <span id="tl-filter-info" class="tl-filter-info">—</span>
      </div>
      <div id="timeline" class="timeline">加载中...</div>
      <div class="card-foot">
        <button id="timeline-more" class="btn">加载更多</button>
      </div>
    </div>

  </section>

  <div class="secondary">

    <details id="collectors-details">
      <summary>
        <span class="title">📡 系统健康</span>
        <span class="hint" id="collectors-hint">—</span>
      </summary>
      <div class="details-body">
        <div id="collectors" class="collectors">—</div>
      </div>
    </details>

    <details id="weekly-reports-section">
      <summary>
        <span class="title">📬 历史周报</span>
        <span class="hint">周一 09:00 自动生成</span>
      </summary>
      <div class="details-body">
        <div id="weekly-reports" class="weekly-reports">—</div>
      </div>
    </details>

    <details id="pending-details">
      <summary>
        <span class="title">🧭 待归一化模型名</span>
        <span class="hint" id="pending-hint">—</span>
      </summary>
      <div class="details-body">
        <div id="pending" class="pending">—</div>
      </div>
    </details>

  </div>
</main>

<footer>
  <div class="stats" id="footer-stats"></div>
  <div>ModelRadar · 自托管实时模型情报 · 数据来源：LMArena / ArtificialAnalysis / SuperCLUE / GitHub</div>
</footer>

<script src="/static/app.js"></script>
</body>
</html>
